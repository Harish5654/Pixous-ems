spring.application.name=hr-portal
spring.profiles.active=dev

# DB_URL supplies the whole JDBC URL when set (e.g. a managed MySQL where the
# database already exists); otherwise it is built from DB_HOST/DB_PORT/DB_NAME.
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hr}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root123}
# Keep at/below the provider's connection cap (Clever Cloud DEV allows 5).
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.pool-name=HrPortalHikari

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
spring.kafka.consumer.group-id=hr-portal-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

server.port=7060
server.error.include-message=always

app.jwt.secret=${APP_JWT_SECRET:Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tcGxlYXNlLTEyMzQ1Njc4OTA=}
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=604800
app.jwt.issuer=hr-portal
app.cors.allowed-origins=http://localhost:5174,http://localhost:3000
app.storage.type=local
app.storage.local-path=${STORAGE_PATH:./storage}
app.attendance.default-geofence-radius-metres=200
app.attendance.late-grace-minutes=15
app.attendance.standard-work-hours=8
app.security.max-failed-login-attempts=5
app.security.account-lock-minutes=15
app.twilio.enabled=${TWILIO_ENABLED:false}
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.from-number=${TWILIO_FROM_NUMBER:}
app.twilio.default-country-code=${TWILIO_DEFAULT_CC:+91}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

logging.level.com.pixous.hrportal=INFO
logging.level.org.springframework.security=WARN

# Actuator: lightweight health endpoint for platform probes (Render/Docker).
# Redis and mail are optional at runtime, so their health indicators are
# disabled to avoid a DOWN status (and failed deploy) when they are absent.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=false
management.health.mail.enabled=false
