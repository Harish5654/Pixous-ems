spring:
  application:
    name: hr-portal
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hr}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: HrPortalHikari
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Kolkata
  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    consumer:
      group-id: hr-portal-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${SERVER_PORT:7060}
  error:
    include-message: always

# ---- Application-specific settings (bound to AppProperties) ----
app:
  jwt:
    # In production set a long, random base64 secret via the APP_JWT_SECRET env var.
    secret: ${APP_JWT_SECRET:Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tcGxlYXNlLTEyMzQ1Njc4OTA=}
    access-token-ttl-seconds: 900        # 15 minutes
    refresh-token-ttl-seconds: 604800    # 7 days
    issuer: hr-portal
  cors:
    allowed-origins:
      - http://localhost:5174
      - http://localhost:3000
  storage:
    type: local                          # local | s3 | minio
    local-path: ${STORAGE_PATH:./storage}
  attendance:
    default-geofence-radius-metres: 200
    late-grace-minutes: 15
    standard-work-hours: 8
  security:
    max-failed-login-attempts: 5
    account-lock-minutes: 15
  twilio:
    enabled: ${TWILIO_ENABLED:false}
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
    default-country-code: ${TWILIO_DEFAULT_CC:+91}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.pixous.hrportal: INFO
    org.springframework.security: WARN

# Actuator: expose only a lightweight liveness health endpoint for platform
# probes (Render/Docker). Redis and mail are optional at runtime, so their
# health indicators are disabled — otherwise /actuator/health would report
# DOWN whenever those optional services are unavailable and fail the deploy.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false
    mail:
      enabled: false
